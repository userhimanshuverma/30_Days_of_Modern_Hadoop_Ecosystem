# Production Kafka Consumer Configurations
# -------------------------------------------------------------
# Bootstrap server list pointing to the local multi-broker cluster external listener ports
bootstrap.servers=localhost:19092,localhost:29092,localhost:39092

# Deserializer classes for keys and values (converts bytes to Objects/Strings)
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Unique identifier for the consumer group this consumer belongs to.
group.id=order-processing-group

# --- OFFSET MANAGEMENT ---
# Disable auto commit to enable manual offset tracking and commit operations.
# This prevents data loss (at-least-once processing guarantee).
enable.auto.commit=false

# What to do when there is no initial offset in Kafka or if the current offset does not exist:
# 'earliest' starts consuming from the beginning of the partitions.
# 'latest' starts consuming from the newly arriving messages only.
auto.offset.reset=earliest

# The maximum number of records returned in a single call to poll().
# Tuning this helps control memory utilization and processing latency.
max.poll.records=500

# --- REBALANCE & TIMEOUTS ---
# The partition assignment strategy to use.
# CooperativeStickyAssignor is highly recommended for modern production clusters as it prevents
# "Stop-the-World" rebalances, reassigning only the shifting partitions.
partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

# Timeout (in milliseconds) used to detect consumer failures. If a broker does not receive a heartbeat
# from a consumer within this window, the consumer is removed and a rebalance is triggered.
session.timeout.ms=45000

# Expected time (in milliseconds) between heartbeats to the consumer coordinator.
# Must be <= 1/3 of session.timeout.ms (e.g., 15000ms).
heartbeat.interval.ms=15000

# The maximum delay between invocations of poll() before the consumer is considered dead.
# If this is exceeded, the consumer leaves the group and triggers a rebalance.
# Enlarge this if individual message processing is slow or database batch writes take time.
max.poll.interval.ms=300000

# Client identifier for debugging and metrics tracing.
client.id=order-consumer-node
