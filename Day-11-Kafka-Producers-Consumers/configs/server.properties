# KRaft Broker Production Configurations (Example for Broker ID 1)
# -------------------------------------------------------------
# Unique identifier for the node within the KRaft cluster
node.id=1

# Roles this process plays in the cluster: 'broker', 'controller', or 'broker,controller'
process.roles=broker,controller

# Quorum voters for the KRaft controller role. Defines mapping of controller node IDs to their endpoints.
controller.quorum.voters=1@kafka1:9093,2@kafka2:9093,3@kafka3:9093

# Endpoints the broker listens on
listeners=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
advertised.listeners=PLAINTEXT://kafka1:9092,EXTERNAL://localhost:19092

# Security protocol maps
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT

# --- TOPIC & PARTITION LOGISTICS ---
# Default number of partitions for automatically created topics.
num.partitions=3

# The replication factor for the offsets topic (which stores consumer offset commits).
# For production clusters with >= 3 brokers, set this to 3.
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2

# Minimum number of in-sync replicas (ISR) that must acknowledge a write for acks=all to succeed.
# Crucial for preventing split-brain or data loss on broker failure.
min.insync.replicas=2

# Directory where log files are stored
log.dirs=/var/lib/kafka/data

# --- RETENTION POLICIES ---
# Retain records for 7 days (168 hours) by default
log.retention.hours=168

# Maximum segment size of a log file. After reaching this size, a new segment is rolled.
log.segment.bytes=1073741824

# Time interval at which to check if any log segment is eligible for deletion
log.retention.check.interval.ms=300000
