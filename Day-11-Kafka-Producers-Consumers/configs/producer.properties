# Production Kafka Producer Configurations
# -------------------------------------------------------------
# Bootstrap server list pointing to the local multi-broker cluster external listener ports
bootstrap.servers=localhost:19092,localhost:29092,localhost:39092

# Serializer classes for keys and values (converts Objects/Strings to bytes)
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- RELIABILITY & DURABILITY ---
# acks=all guarantees that the leader will wait for the full set of in-sync replicas (ISR) to acknowledge the record.
acks=all

# Enables idempotent producer behavior which prevents duplicate message delivery on retries,
# and enforces message ordering even if requests fail.
enable.idempotence=true

# Number of retries when sending fails due to transient broker errors.
# Since idempotence is enabled, this can be set to Integer.MAX_VALUE without duplicate risk.
retries=2147483647

# The maximum number of unacknowledged requests the client will send on a single connection before blocking.
# Must be <= 5 when enable.idempotence=true to preserve ordering.
max.in.flight.requests.per.connection=5

# --- PERFORMANCE & THROUGHPUT ---
# Compression type to apply to batches. Zstd offers excellent compression ratios with low CPU overhead.
compression.type=zstd

# The producer will wait up to this time (in milliseconds) to allow other records to be batched together.
linger.ms=20

# The maximum size in bytes of a single batch. Larger batches lead to better throughput and compression.
# 64 KB is standard for medium-to-large throughput.
batch.size=65536

# The total memory (in bytes) the producer can use to buffer records waiting to be sent to the server.
# 32 MB is the default, which is sufficient for standard workloads.
buffer.memory=33554432

# Max time the producer will block when buffer is full before throwing TimeoutException.
max.block.ms=60000

# Client identifier for debugging and metrics tracing.
client.id=order-producer-service
