# Day 17: Apache Spark SQL Defaults Configuration
# Location: Day-17-Spark-SQL-Catalyst/configs/spark-defaults.conf

# Spark Master Configuration
spark.master                     spark://spark-master:7077

# Event Logging and History Server
spark.eventLog.enabled           true
spark.eventLog.dir               hdfs://namenode:9000/shared/spark-logs
spark.history.fs.logDirectory    hdfs://namenode:9000/shared/spark-logs

# Serialization (Kryo is faster & more compact than Java Serialization)
spark.serializer                 org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max  128m

# Memory Management (Tungsten and Unified Memory Tuning)
spark.memory.fraction            0.6
spark.memory.storageFraction     0.5
spark.memory.offHeap.enabled     true
spark.memory.offHeap.size        512m

# Shuffle & Dynamic Allocation Settings
spark.shuffle.service.enabled    true
spark.dynamicAllocation.enabled  true
spark.dynamicAllocation.minExecutors 1
spark.dynamicAllocation.maxExecutors 10
spark.dynamicAllocation.executorIdleTimeout 60s
spark.dynamicAllocation.cachedExecutorIdleTimeout 120s

# Spark SQL Engine Settings
spark.sql.shuffle.partitions                  10
spark.sql.codegen.wholeStage                  true
spark.sql.autoBroadcastJoinThreshold          10485760
spark.sql.parquet.filterPushdown              true
spark.sql.orc.filterPushdown                  true

# Adaptive Query Execution (AQE)
spark.sql.adaptive.enabled                    true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.coalescePartitions.initialPartitionNum 20
spark.sql.adaptive.skewJoin.enabled           true
spark.sql.adaptive.localShuffleReader.enabled true

# Default Container Sizing
spark.driver.memory              1g
spark.executor.memory            2g
spark.executor.cores             2
