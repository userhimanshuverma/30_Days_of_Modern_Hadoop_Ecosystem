# zoo3.cfg
# Production-grade Apache ZooKeeper configuration for Node 3 in a 3-node ensemble

# The number of milliseconds of each tick
tickTime=2000

# The number of ticks that the initial synchronization phase can take
initLimit=10

# The number of ticks that can pass between sending a request and getting an acknowledgement
syncLimit=5

# The directory where the snapshot is stored.
dataDir=/data

# The directory where the transaction log is stored.
dataLogDir=/datalog

# The port at which the clients will connect
clientPort=2181

# Disable the admin server or run it on a unique port to avoid conflicts
admin.enableServer=true
admin.serverPort=8080

# Limit the number of client connections of a single socket address.
# Set to 0 for unlimited.
maxClientCnxns=60

# The number of snapshots to retain in dataDir
autopurge.snapRetainCount=5

# Purge task interval in hours. Set to a positive integer to enable auto-purging.
autopurge.purgeInterval=1

# Server list. server.X=hostname:peerPort:leaderElectionPort
server.1=zookeeper1:2888:3888
server.2=zookeeper2:2888:3888
server.3=zookeeper3:2888:3888

# Metrics Provider configuration (Prometheus integration)
metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider
metricsProvider.httpHost=0.0.0.0
metricsProvider.httpPort=7000
metricsProvider.exportJvmInfo=true

# Enable 4-letter word commands for diagnostics
4lw.commands.whitelist=*
