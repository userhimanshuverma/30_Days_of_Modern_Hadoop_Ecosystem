version: '3.8'

services:
  kafka-day12:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-day12
    hostname: kafka-day12
    restart: unless-stopped
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-day12:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-day12:9092,EXTERNAL://localhost:19092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: '6L62ZDwCQIK-GGy4aG37wB'
      KAFKA_CLUSTER_ID: '6L62ZDwCQIK-GGy4aG37wB'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day12-network

  schema-registry-day12:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry-day12
    hostname: schema-registry-day12
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-day12
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka-day12:9092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_COMPATIBILITY_LEVEL: 'backward'
    depends_on:
      kafka-day12:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day12-network

  akhq-day12:
    image: tchiotludo/akhq:0.25.0
    container_name: akhq-day12
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-cluster:
              properties:
                bootstrap.servers: "kafka-day12:9092"
              schema-registry:
                url: "http://schema-registry-day12:8081"
    depends_on:
      kafka-day12:
        condition: service_healthy
      schema-registry-day12:
        condition: service_healthy
    networks:
      - day12-network

volumes:
  kafka-data:

networks:
  day12-network:
    name: day12-network
    driver: bridge
