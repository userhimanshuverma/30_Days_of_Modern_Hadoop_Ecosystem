###############################################################################
# Schema Registry Day 12 - Kafka Avro Producer Properties
# Production-Grade Idempotent Configuration
###############################################################################

# Bootstrap brokers
bootstrap.servers=localhost:19092

# Schema Registry URL for registering and resolving Avro schemas
schema.registry.url=http://localhost:8081

# Serializers for keys and values
# Value serializer is the KafkaAvroSerializer which integrates with Schema Registry
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

# Acknowledgment level. "all" guarantees full broker consensus write before return
acks=all

# Idempotence ensures exact-once delivery per message session (no duplicates on retry)
enable.idempotence=true

# Retries count. Set to maximum to allow client-side handling of transient broker errors
retries=2147483647

# Max in flight requests must be <= 5 when idempotence is enabled. Set to 1 for strict ordering.
max.in.flight.requests.per.connection=5

# Compression type for reducing network IO and storage foot-print
compression.type=snappy

# Batching optimization
linger.ms=20
batch.size=16384
