###############################################################################
# Confluent Schema Registry Configuration File (Production-Grade)
# Day 12 — Schema Registry
###############################################################################

# The port on which Schema Registry listens for HTTP requests.
listeners=http://0.0.0.0:8081

# The host name advertised to other instances of Schema Registry.
host.name=localhost

# List of Kafka brokers to connect to for writing and reading the schema storage topic.
kafkastore.bootstrap.servers=PLAINTEXT://localhost:19092

# The name of the compacted Kafka topic used to store schemas.
# Default is _schemas. In production, this should be highly available (replication factor >= 3).
kafkastore.topic=_schemas

# The replication factor for the kafkastore topic. Must match or be less than the broker cluster size.
# Set to 3 for production HA environments. Set to 1 for single-node development.
kafkastore.topic.replication.factor=1

# Group ID for the Schema Registry cluster. All instances with the same group ID work as a cluster
# and perform leader election for schema registration coordination.
schema.registry.group.id=schema-registry-group

# Determines which Schema Registry instance is the primary leader.
# Leader handles schema writes; followers forward write requests to the leader.
master.eligibility=true

# Compatibility mode default. Can be overwritten at the subject level.
# Options: NONE, BACKWARD, FORWARD, FULL, BACKWARD_TRANSITIVE, FORWARD_TRANSITIVE, FULL_TRANSITIVE
avro.compatibility.level=backward

# Maximum number of schemas to keep in the local JVM cache.
# Increasing this values speeds up serializations/deserializations for high throughput clusters.
max.schemas.per.subject=1000

# Write/Read timeouts for Schema Registry internal operations.
kafkastore.timeout.ms=5000
kafkastore.init.timeout.ms=60000

# Logging level tuning configurations
log.path=/var/log/schema-registry
