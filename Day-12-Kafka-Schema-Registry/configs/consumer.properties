###############################################################################
# Schema Registry Day 12 - Kafka Avro Consumer Properties
# Production-Grade Schema-Aware Configuration
###############################################################################

# Bootstrap brokers
bootstrap.servers=localhost:19092

# Schema Registry URL for retrieving schemas based on the 4-byte Schema ID in messages
schema.registry.url=http://localhost:8081

# Deserializers for keys and values
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer

# Consumer group identifier
group.id=avro-user-consumer-group

# What to do when there is no initial offset in Kafka or if the current offset does not exist
auto.offset.reset=earliest

# Disable auto commits to allow manual offset commit patterns (production-ready)
enable.auto.commit=false

# Specific Avro Reader option:
# When true: tells the KafkaAvroDeserializer to compile/deserialize into specific generated Java classes (e.g., com.hadoop.schema.User).
# When false: deserializes into GenericRecord.
specific.avro.reader=true
