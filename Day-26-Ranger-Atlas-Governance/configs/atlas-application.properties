#########  Atlas Server Configurations  #########
atlas.server.http.port=21000
atlas.server.https.port=21443

# Graph Storage Backend (JanusGraph)
# Production uses hbase, development can use berkeleyje
atlas.graph.storage.backend=berkeleyje
atlas.graph.storage.directory=/var/lib/atlas/data/berkeley
# For production HBase:
# atlas.graph.storage.backend=hbase
# atlas.graph.storage.hostname=hbase-master:2181
# atlas.graph.storage.hbase.table=atlas_janus

# Search Index Backend (Solr)
atlas.graph.index.search.backend=solr
# For production Solr Cloud:
# atlas.graph.index.search.solr.mode=cloud
# atlas.graph.index.search.solr.zookeeper-url=zookeeper:2181/solr
# For Dev/Embedded Solr:
atlas.graph.index.search.solr.mode=http
atlas.graph.index.search.solr.http-urls=http://solr:8983/solr

# SOLR index collection names
atlas.graph.index.search.vertex.name=vertex_index
atlas.graph.index.search.edge.name=edge_index
atlas.graph.index.search.fulltext.name=fulltext_index

#########  Kafka Notification Integration  #########
atlas.notification.embedded=false
atlas.kafka.bootstrap.servers=kafka:9092
atlas.kafka.zookeeper.connect=zookeeper:2181
atlas.kafka.consumer.group.id=atlas
atlas.kafka.auto.commit.enable=true

# Kafka topics for metadata notifications
atlas.notification.topics=ATLAS_HOOK,ATLAS_ENTITIES
atlas.notification.create.topics=true
atlas.notification.replicas=1

#########  Security & Authentication  #########
atlas.authentication.method.file=true
# Set to true to enable LDAP/Active Directory
atlas.authentication.method.ldap=false
atlas.authentication.method.kerberos=false

# LDAP Configuration (Template)
# atlas.authentication.method.ldap.url=ldap://ad.enterprise.com:389
# atlas.authentication.method.ldap.bind.dn=cn=admin,dc=enterprise,dc=com
# atlas.authentication.method.ldap.bind.password=secret
# atlas.authentication.method.ldap.user.searchfilter=(sAMAccountName={0})

#########  Audit Log Storage  #########
# Store entity audits in JanusGraph
atlas.EntityAuditRepository.impl=org.apache.atlas.repository.audit.JanusGraphAuditRepository

#########  Atlas Hooks & Integrations  #########
# Enables automatic lineage processing from Hive hooks
atlas.hook.hive.synchronous=false
atlas.hook.hive.numRetries=3
atlas.hook.hive.queue.size=10000
