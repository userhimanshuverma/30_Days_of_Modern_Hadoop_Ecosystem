version: '3.8'

networks:
  governance-net:
    driver: bridge
    name: governance-net

volumes:
  postgres-data:
  solr-data:
  zk-data:
  kafka-data:
  hadoop-namenode:
  hadoop-datanode:
  ranger-cache:
  atlas-data:

services:
  zookeeper:
    image: zookeeper:3.8
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - governance-net
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/data

  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    networks:
      - governance-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_MULTIPLE_DATABASES: ranger_db,atlas_db,metastore
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialization script to create separate DBs
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro

  solr:
    image: solr:8.11
    container_name: solr
    hostname: solr
    networks:
      - governance-net
    ports:
      - "8983:8983"
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx1g
    volumes:
      - solr-data:/var/solr
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - ranger_audits

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    hostname: kafka
    networks:
      - governance-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper

  ranger-admin:
    build:
      context: ./ranger
      dockerfile: Dockerfile
    image: apache/ranger-admin:2.4.0
    container_name: ranger-admin
    hostname: ranger-admin
    networks:
      - governance-net
    ports:
      - "6080:6080"
    environment:
      - DB_FLAVOR=POSTGRES
      - db_host=postgres:5432
      - db_root_user=root
      - db_root_password=root_password
      - db_name=ranger_db
      - db_user=ranger
      - db_password=ranger_password
      - rangerAdmin_password=RangerAdminPassword123
      - audit_solr_urls=http://solr:8983/solr/ranger_audits
    depends_on:
      - postgres
      - solr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080/login.jsp"]
      interval: 15s
      timeout: 10s
      retries: 5

  atlas:
    build:
      context: ./atlas
      dockerfile: Dockerfile
    image: apache/atlas:2.3.0
    container_name: atlas
    hostname: atlas
    networks:
      - governance-net
    ports:
      - "21000:21000"
    environment:
      - ATLAS_SERVER_HTTP_PORT=21000
      - ATLAS_SERVER_HTTPS_PORT=21443
      - ATLAS_GRAPH_STORAGE_BACKEND=berkeleyje
      - ATLAS_GRAPH_INDEX_SEARCH_BACKEND=solr
      - ATLAS_GRAPH_INDEX_SEARCH_SOLR_HTTP_URLS=http://solr:8983/solr
      - ATLAS_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - atlas-data:/var/lib/atlas/data
      - ../configs/atlas-application.properties:/opt/apache-atlas/conf/atlas-application.properties:ro
    depends_on:
      - postgres
      - solr
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:21000/api/atlas/admin/version"]
      interval: 20s
      timeout: 10s
      retries: 5

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    networks:
      - governance-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop-namenode:/hadoop/dfs/name
      - ../configs/ranger-hdfs-security.xml:/etc/hadoop/conf/ranger-hdfs-security.xml:ro
    depends_on:
      - ranger-admin

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    networks:
      - governance-net
    ports:
      - "9864:9864"
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop-datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  hive-metastore:
    image: bde2020/hive:3.1.2.2
    container_name: hive-metastore
    hostname: hive-metastore
    networks:
      - governance-net
    environment:
      - SERVICE_PRECONDITION=namenode:9000 postgres:5432
    volumes:
      - ../configs/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ../configs/ranger-hive-security.xml:/opt/hive/conf/ranger-hive-security.xml:ro
    depends_on:
      - namenode
      - postgres

  hive-server2:
    image: bde2020/hive:3.1.2.2
    container_name: hive-server2
    hostname: hive-server2
    networks:
      - governance-net
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      - SERVICE_PRECONDITION=hive-metastore:9083
    volumes:
      - ../configs/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ../configs/ranger-hive-security.xml:/opt/hive/conf/ranger-hive-security.xml:ro
    depends_on:
      - hive-metastore
      - ranger-admin
      - atlas
