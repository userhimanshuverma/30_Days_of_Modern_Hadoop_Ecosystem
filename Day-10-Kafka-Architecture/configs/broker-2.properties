# broker-2.properties - Kafka KRaft Node 2 Configuration
# -------------------------------------------------------------
# Core Node Configuration
node.id=2
process.roles=broker,controller
controller.quorum.voters=1@localhost:9093,2@localhost:19093,3@localhost:29093

# Network Listeners
# Port 9094 for client traffic, Port 19093 for controller voting traffic
listeners=PLAINTEXT://:9094,CONTROLLER://:19093
advertised.listeners=PLAINTEXT://localhost:9094
controller.listener.names=CONTROLLER
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

# Log & Storage Configurations
log.dirs=/var/lib/kafka/data-2
num.partitions=3
num.recovery.threads.per.data.dir=1

# Replication Settings
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
default.replication.factor=3

# Log Retention Policies
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

# Zookeeper is NOT configured (KRaft mode active)
metadata.log.dir=/var/lib/kafka/metadata-2
