# client.properties - Production Client Configuration Template
# -------------------------------------------------------------
# Core Connection Configurations
bootstrap.servers=localhost:19092,localhost:29092,localhost:39092
client.id=demo-admin-client

# -------------------------------------------------------------
# Producer-Specific Tuning Configurations
# -------------------------------------------------------------
# Acknowledgements: 'all' guarantees durability by waiting for all ISRs to write.
acks=all

# Retries and Idempotence
enable.idempotence=true
retries=2147483647
max.in.flight.requests.per.connection=5

# Compression and Throughput
compression.type=lz4
linger.ms=20
batch.size=32768

# Timeouts
request.timeout.ms=30000
delivery.timeout.ms=120000

# -------------------------------------------------------------
# Consumer-Specific Tuning Configurations
# -------------------------------------------------------------
# Offsets management
enable.auto.commit=false
auto.offset.reset=earliest

# Fetch parameters
fetch.min.bytes=1024
fetch.max.wait.ms=500
max.partition.fetch.bytes=1048576

# Session timeouts and heartbeat
session.timeout.ms=45000
heartbeat.interval.ms=15000
max.poll.interval.ms=300000

