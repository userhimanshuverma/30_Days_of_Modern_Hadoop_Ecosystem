version: '3.8'

services:
  # =========================================================================
  # 1. HDFS NAMENODE (METADATA MASTER)
  # =========================================================================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode-day08
    restart: unless-stopped
    ports:
      - "9870:9870"  # NameNode Web UI
      - "9000:9000"  # NameNode RPC Port
    env_file:
      - ./hadoop.env
    volumes:
      - ../configs/yarn-site.xml:/etc/hadoop/yarn-site.xml
      - namenode_data_day08:/hadoop/dfs/name
    networks:
      - day08-network

  # =========================================================================
  # 2. HDFS DATANODE (BLOCK STORAGE WORKER)
  # =========================================================================
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-day08
    restart: unless-stopped
    ports:
      - "9864:9864"  # DataNode Web UI
    env_file:
      - ./hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - ../configs/yarn-site.xml:/etc/hadoop/yarn-site.xml
      - datanode_data_day08:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - day08-network

  # =========================================================================
  # 3. YARN RESOURCEMANAGER (COMPUTE MASTER)
  # =========================================================================
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager-day08
    restart: unless-stopped
    ports:
      - "8088:8088"  # ResourceManager Web UI
      - "8032:8032"  # ApplicationMaster RPC
      - "8030:8030"  # Scheduler IPC RPC
      - "8031:8031"  # NodeManager Resource Tracker RPC
    env_file:
      - ./hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode:9864
    volumes:
      - ../configs/yarn-site.xml:/etc/hadoop/yarn-site.xml
    depends_on:
      - namenode
      - datanode
    networks:
      - day08-network

  # =========================================================================
  # 4. YARN NODEMANAGER (COMPUTE WORKER WITH DOCKER BINDING)
  # =========================================================================
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager-day08
    restart: unless-stopped
    user: root  # Must run as root to interface with host docker socket and manage container-executor
    ports:
      - "8042:8042"  # NodeManager Web UI
    env_file:
      - ./hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088
    volumes:
      # Mount configurations
      - ../configs/yarn-site.xml:/etc/hadoop/yarn-site.xml
      - ../configs/container-executor.cfg:/etc/hadoop/container-executor.cfg
      # Sibling Docker runtime integration: Mount host Docker socket and binaries
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      # Log and Cache Directories
      - /var/log/hadoop-yarn/containers:/var/log/hadoop-yarn/containers
      - /var/lib/hadoop-yarn/cache:/var/lib/hadoop-yarn/cache
    depends_on:
      - namenode
      - datanode
      - resourcemanager
    networks:
      - day08-network

# ===========================================================================
# NETWORKS & VOLUMES DEFINITIONS
# ===========================================================================
networks:
  day08-network:
    name: day08-network
    driver: bridge

volumes:
  namenode_data_day08:
  datanode_data_day08:
