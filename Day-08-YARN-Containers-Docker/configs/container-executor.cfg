# Unix group authorized to run the container-executor binary
yarn.nodemanager.linux-container-executor.group=yarn

# Banned users who cannot run containers
banned.users=root,bin,daemon,sys

# Minimum user ID allowed to run tasks. Users with smaller IDs are blocked for security.
min.user.id=1000

# Allowed system users who bypass the minimum user ID check (e.g. for standard services)
allowed.system.users=nobody,yarn

# Docker-specific configuration section
[docker]
  # Configured networks that YARN containers are allowed to connect to
  docker.allowed.networks=host,bridge,none,hadoop-network

  # Allowed capabilities that a YARN container can request (avoiding CAP_SYS_ADMIN, etc.)
  docker.capabilities=CHOWN,DAC_OVERRIDE,FOWNER,SETGID,SETUID

  # Explicitly ban privileged container executions
  docker.privileged-containers.allowed=false

  # Disallow host pid namespace sharing
  docker.host-pid-namespace.allowed=false

  # Directory mounts allowed into Docker containers (read-only and read-write)
  docker.allowed.ro-mounts=/sys/fs/cgroup
  docker.allowed.rw-mounts=/var/log/hadoop-yarn/containers,/var/lib/hadoop-yarn/cache
