# configs/airflow.cfg
# Production-tuned Apache Airflow Configuration Template
# Optimized for high-throughput enterprise workloads in Hadoop & Spark Environments

[core]
# The home folder for airflow
airflow_home = /opt/airflow

# The executor class that airflow should use. Choices:
# SequentialExecutor, LocalExecutor, CeleryExecutor, KubernetesExecutor, CeleryKubernetesExecutor
executor = CeleryExecutor

# The SqlAlchemy connection string to the metadata database.
# In production, use high-availability PostgreSQL or MySQL.
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow_secure_pass@postgres:5432/airflow_db

# The number of task instances allowed to run concurrently by the scheduler.
parallelism = 64

# The maximum number of active DAG runs per DAG.
max_active_runs_per_dag = 16

# The number of tasks that can run concurrently per DAG.
dag_concurrency = 32

# Whether to load the examples that ship with Airflow. (Set to False for production)
load_examples = False

# Whether to load default connections on database initialization. (Set to False for production)
load_default_connections = False

# The amount of time (in seconds) that a task can be in the queued state before being failed.
# Helps clean up stuck tasks in worker nodes.
task_queued_timeout = 600

# How long to wait for a task to launch before timing out.
task_runner = StandardTaskRunner

[database]
# The SqlAlchemy pool size is the maximum number of database connections in the pool.
sql_alchemy_pool_size = 20

# The maximum overflow size for the SqlAlchemy connection pool.
sql_alchemy_max_overflow = 10

# The number of seconds after which a database connection is automatically recycled.
sql_alchemy_pool_recycle = 1800

# The SqlAlchemy connection pre-ping feature checks database availability before query execution.
sql_alchemy_pool_pre_ping = True

[logging]
# The folder where airflow should store its task logs.
base_log_folder = /opt/airflow/logs

# The log level that airflow should use. Choices: DEBUG, INFO, WARNING, ERROR, CRITICAL
logging_level = INFO

# Log formatters for task instances
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
simple_log_format = %%(asctime)s %%(levelname)s - %%(message)s

# Remote logging configuration (S3, GCS, or WASB)
# In production, send logs to cloud storage or centralized log aggregates like ES/Splunk.
remote_logging = False
# remote_log_conn_id = MyS3Conn
# remote_base_log_folder = s3://my-airflow-logs/logs
# encrypt_s3_logs = False

[scheduler]
# The number of scheduler threads that can run in parallel to schedule DAGs.
max_threads = 4

# How often (in seconds) the scheduler should scan the DAGs directory for changes.
# Setting this too low causes excessive CPU load; setting it too high introduces DAG update lag.
min_file_process_interval = 30

# How often (in seconds) to parse the DAG files.
# Increasing this values reduces metadata database write IOPS.
dag_dir_list_interval = 60

# The number of seconds after which a DAG file is considered dead if not parsed.
dag_file_processor_timeout = 60

# The number of task instances scheduler will process in one scheduling loop.
scheduler_heartbeat_sec = 5

# The frequency (in seconds) to check if any task instances have timed out in queues.
clean_tis_without_dagrun_interval = 15.0

# Number of seconds after which the scheduler decides that a worker is dead.
scheduler_zombie_task_threshold = 300

# Parse DAGs asynchronously to ensure scheduler isn't blocked by slow parsing logic.
standalone_dag_processor = False

[celery]
# The Celery broker URL. In CeleryExecutor setup, Redis or RabbitMQ acts as the message broker.
broker_url = redis://:redis_secure_pass@redis:6379/0

# The Celery result backend URL. Redis or the Airflow DB are commonly used.
result_backend = db+postgresql://airflow:airflow_secure_pass@postgres:5432/airflow_db

# The number of concurrent Celery worker processes.
worker_concurrency = 16

# The Celery worker prefetch multiplier.
# A value of 1 ensures workers pull only one task at a time, preventing task starvation.
worker_prefetch_multiplier = 1

# Celery tasks timeout (seconds)
task_acks_late = True
task_reject_on_worker_lost = True

[webserver]
# The base URL of the Airflow Web UI.
web_server_host = 0.0.0.0
web_server_port = 8080

# The time (in seconds) before a worker process is killed due to inactivity.
web_server_worker_timeout = 120

# Number of workers to run for the web server (typically: 2 * CPU_CORES + 1).
workers = 4

# Secret key used to encrypt cookie session data. Replace with a secure random key.
secret_key = production_fallback_secret_key_to_be_replaced

# Enable RBAC security (True is mandatory in modern Airflow versions)
rbac = True

# Disable showing stack traces to normal users in case of runtime UI crashes.
expose_config = False
