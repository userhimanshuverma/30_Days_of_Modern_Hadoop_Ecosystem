# Spark Configurations for Hive on Spark (HoS) and Spark SQL Catalog
spark.master                     yarn
spark.submit.deployMode          client
spark.eventLog.enabled           true
spark.eventLog.dir               hdfs:///spark-history

# Executor and Driver Memory/Core Settings
spark.driver.memory              1g
spark.yarn.am.memory             1g
spark.executor.instances         2
spark.executor.cores             2
spark.executor.memory            2g

# Memory allocation settings
spark.memory.fraction            0.6
spark.memory.storageFraction     0.5

# Serialization (Kryo is recommended for production)
spark.serializer                 org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max  512m

# YARN Integration Jars location
# In a cluster, uploading Spark jars to HDFS speeds up container startup
# spark.yarn.jars                hdfs:///spark-jars/*.jar

# SQL Catalyst and Metastore Integration
spark.sql.warehouse.dir          /user/hive/warehouse
spark.sql.catalogImplementation  hive
spark.sql.hive.metastore.sharedPrefixes  org.postgresql,org.apache.hadoop
