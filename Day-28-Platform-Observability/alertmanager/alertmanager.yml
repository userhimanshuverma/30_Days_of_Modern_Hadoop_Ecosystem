# alertmanager/alertmanager.yml
# Production Alertmanager Routing and Inhibition Configuration

global:
  resolve_timeout: 5m
  slack_api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-default'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-high-priority'
      continue: true

    - match:
        severity: critical
      receiver: 'slack-critical'

    - match:
        severity: warning
      receiver: 'slack-warnings'

inhibit_rules:
  # Suppress process/service alerts if host node is completely DOWN
  - source_match:
      alertname: 'InstanceDown'
    target_match_re:
      alertname: '.*(ProcessDown|ServiceError|HighCpu).*'
    equal: ['instance']

receivers:
  - name: 'slack-default'
    slack_configs:
      - channel: '#platform-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] Platform Alert'
        text: '{{ template "slack.default.text" . }}'

  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 CRITICAL INCIDENT: {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.default.text" . }}'

  - name: 'slack-warnings'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.default.text" . }}'

  - name: 'pagerduty-high-priority'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }} on {{ .GroupLabels.cluster }}'
