version: '3.8'

services:
  # =========================================================================
  # 1. METASTORE DATABASE (PostgreSQL backend)
  # =========================================================================
  postgres-metastore-db:
    image: postgres:15-alpine
    container_name: postgres-metastore-db-day20
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres_data_day20:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - day20-network

  # =========================================================================
  # 2. HDFS NAMENODE
  # =========================================================================
  namenode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: namenode-day20
    restart: unless-stopped
    ports:
      - "9870:9870"  # HDFS Namenode Web UI
      - "9000:9000"  # HDFS Namenode RPC Port
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - namenode_data_day20:/hadoop/dfs/name
      - ../:/workspace
    command: ["namenode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day20-network

  # =========================================================================
  # 3. HDFS DATANODE
  # =========================================================================
  datanode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datanode-day20
    restart: unless-stopped
    ports:
      - "9864:9864"  # HDFS Datanode Web UI
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - datanode_data_day20:/hadoop/dfs/data
      - ../:/workspace
    command: ["datanode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day20-network

  # =========================================================================
  # 4. HIVE METASTORE SERVER (HMS)
  # =========================================================================
  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hive-metastore-day20
    restart: unless-stopped
    ports:
      - "9083:9083"  # HMS Thrift Port
    depends_on:
      postgres-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HIVE_CONF_DIR=/opt/hive/conf
    volumes:
      - ../:/workspace
    command: ["metastore"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day20-network

  # =========================================================================
  # 5. HIVESERVER2 (HS2)
  # =========================================================================
  hiveserver2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiveserver2-day20
    restart: unless-stopped
    ports:
      - "10000:10000"  # HS2 Thrift JDBC Port
      - "10002:10002"  # HS2 Web UI Port
    depends_on:
      hive-metastore:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HIVE_CONF_DIR=/opt/hive/conf
    volumes:
      - ../:/workspace
    command: ["hiveserver2"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day20-network

networks:
  day20-network:
    name: day20-network
    driver: bridge

volumes:
  postgres_data_day20:
  namenode_data_day20:
  datanode_data_day20:
