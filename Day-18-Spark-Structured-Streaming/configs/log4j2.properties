# Day 18: Spark Structured Streaming Log4j2 Configuration
# Location: Day-18-Spark-Structured-Streaming/configs/log4j2.properties

# Set root logger level and appenders
rootLogger.level = INFO
rootLogger.appenderRefs = stdout
rootLogger.appenderRef.stdout.ref = STDOUT

# Console Appender
appender.stdout.type = Console
appender.stdout.name = STDOUT
appender.stdout.layout.type = PatternLayout
appender.stdout.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Spark logging settings
logger.spark.name = org.apache.spark
logger.spark.level = INFO

# Silence verbose context cleaner and heartbeat logs
logger.spark_cleaner.name = org.apache.spark.ContextCleaner
logger.spark_cleaner.level = WARN

logger.spark_heartbeat.name = org.apache.spark.storage.BlockManagerMessages
logger.spark_heartbeat.level = WARN

# Silence Hadoop & ZooKeeper
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = WARN

# Silence Kafka client verbose logs
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN
