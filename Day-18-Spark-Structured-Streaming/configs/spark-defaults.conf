# Day 18: Apache Spark Structured Streaming Defaults Configuration
# Location: Day-18-Spark-Structured-Streaming/configs/spark-defaults.conf

# Spark Master Configuration
spark.master                     spark://spark-master:7077

# Event Logging and History Server
spark.eventLog.enabled           true
spark.eventLog.dir               hdfs://namenode:9000/shared/spark-logs
spark.history.fs.logDirectory    hdfs://namenode:9000/shared/spark-logs

# Serialization
spark.serializer                 org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max  128m

# Memory Management (Tuned for Stateful Streaming & Off-heap State)
spark.memory.fraction            0.6
spark.memory.storageFraction     0.3
spark.memory.offHeap.enabled     true
spark.memory.offHeap.size        512m

# Shuffle & Dynamic Allocation
# Note: Dynamic allocation is generally disabled for streaming jobs in production
# to avoid constant executor churn, but standalone defaults are kept here.
spark.shuffle.service.enabled    true
spark.dynamicAllocation.enabled  false

# Spark SQL / Structured Streaming Settings
# Crucial: Lower default shuffle partitions from 200 to 4 for local/Docker workloads
spark.sql.shuffle.partitions                  4
spark.sql.streaming.schemaInference           true
spark.sql.streaming.forceDeleteTempCheckpointLocation true

# Spark-Kafka Connector Package (Scala 2.12 compatibility for Spark 3.5.1)
spark.jars.packages                           org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1

# Default Container Sizing
spark.driver.memory              1g
spark.executor.memory            1500m
spark.executor.cores             2
