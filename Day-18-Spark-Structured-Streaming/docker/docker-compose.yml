version: '3.8'

services:
  # =========================================================================
  # 1. KAFKA BROKER (KRaft Mode - ZooKeeper-less)
  # =========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-day18
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day18-network

  # =========================================================================
  # 2. HDFS NAMENODE
  # =========================================================================
  namenode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: namenode-day18
    restart: unless-stopped
    ports:
      - "9870:9870"  # Web UI
      - "9000:9000"  # RPC
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - namenode_data_day18:/hadoop/dfs/name
      - ../:/workspace
    command: ["namenode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day18-network

  # =========================================================================
  # 3. HDFS DATANODE
  # =========================================================================
  datanode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datanode-day18
    restart: unless-stopped
    ports:
      - "9864:9864"  # Web UI
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - datanode_data_day18:/hadoop/dfs/data
      - ../:/workspace
    command: ["datanode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day18-network

  # =========================================================================
  # 4. SPARK STANDALONE MASTER
  # =========================================================================
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-master-day18
    restart: unless-stopped
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master RPC
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ../:/workspace
    command: ["spark-master"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day18-network

  # =========================================================================
  # 5. SPARK WORKER
  # =========================================================================
  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-worker-day18
    restart: unless-stopped
    ports:
      - "8081:8081"  # Spark Worker Web UI
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ../:/workspace
    command: ["spark-worker"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - day18-network

  # =========================================================================
  # 6. SPARK CLIENT GATEWAY
  # =========================================================================
  spark-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-client-day18
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ../:/workspace
    command: ["spark-client"]
    networks:
      - day18-network

networks:
  day18-network:
    name: day18-network
    driver: bridge

volumes:
  namenode_data_day18:
  datanode_data_day18:
