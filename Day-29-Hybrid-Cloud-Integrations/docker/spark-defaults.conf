# Spark Configuration for Hybrid Cloud Object Storage Integrations
spark.master                      spark://spark-master:7077
spark.app.name                    Day29-HybridCloudSpark

# Maven packages for AWS S3A, Azure ADLS Gen2 (ABFS), and GCS Connectors
spark.jars.packages               org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.hadoop:hadoop-azure:3.3.4,com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.8

# Hive Metastore Integration
spark.sql.hive.metastore.version  3.1.3
spark.hadoop.hive.metastore.uris  thrift://hive-metastore:9083

# S3A Committers & Performance Optimizations
spark.hadoop.fs.s3a.impl          org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint      http://minio:9000
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.access.key    minioadmin
spark.hadoop.fs.s3a.secret.key    minioadminpassword
spark.hadoop.fs.s3a.committer.name magic
spark.hadoop.fs.s3a.committer.magic.enabled true
spark.sql.sources.commitProtocolClass org.apache.spark.internal.io.cloud.PathOutputCommitProtocol
spark.sql.parquet.output.committer.class org.apache.spark.internal.io.cloud.FileOutputCommitterFactory

# Memory & Serialization Settings
spark.driver.memory               1g
spark.executor.memory             1g
spark.serializer                  org.apache.spark.serializer.KryoSerializer
