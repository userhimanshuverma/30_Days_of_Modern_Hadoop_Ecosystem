version: '3.8'

services:
  # MinIO: Local S3-compatible Object Storage for Hybrid Testing
  minio:
    image: minio/minio:RELEASE.2023-09-20T22-40-07Z
    container_name: day29-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init Bucket Creator
  minio-init:
    image: minio/mc:RELEASE.2023-09-16T01-14-16Z
    container_name: day29-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb --ignore-existing myminio/warehouse;
      /usr/bin/mc mb --ignore-existing myminio/analytics;
      echo 'MinIO buckets initialized successfully.';
      exit 0;
      "

  # PostgreSQL for Hive Metastore DB
  metastore-db:
    image: postgres:13-alpine
    container_name: day29-metastore-db
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
    ports:
      - "5432:5432"
    volumes:
      - metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Hive Metastore Service
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: day29-hive-metastore
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://metastore-db:5432/metastore_db"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionPassword: "hivepassword"
    volumes:
      - ./core-site.xml:/opt/hive/conf/core-site.xml
      - ./hive-site.xml:/opt/hive/conf/hive-site.xml
    command: /opt/hive/bin/hive --service metastore

  # Spark Master Node
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: day29-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./core-site.xml:/opt/bitnami/spark/conf/core-site.xml
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf

  # Spark Worker Node
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: day29-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./core-site.xml:/opt/bitnami/spark/conf/core-site.xml
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf

  # Trino Coordinator
  trino:
    image: trinodb/trino:435
    container_name: day29-trino
    ports:
      - "8081:8080"
    volumes:
      - ./trino-catalog.properties:/etc/trino/catalog/cloud_hive.properties
    depends_on:
      - hive-metastore
      - minio

volumes:
  minio-data:
  metastore-db-data:
